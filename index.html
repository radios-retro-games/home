    /* Menú Hamburguesa */
    nav {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 2000;
    }

    #menu-toggle {
      font-size: 2rem;
      cursor: pointer;
      background: rgba(0,0,0,0.3);
      padding: 10px 15px;
      border-radius: 8px;
    }

    #menu-options {
      display: none;
      flex-direction: column;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
    }

    #menu-options button {
      background: none;
      color: white;
      border: none;
      padding: 8px;
      text-align: right;
      cursor: pointer;
    }

    #menu-options button:hover {
      text-decoration: underline;
    }

    header {
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-top: 60px; /* espacio para el menú arriba */
    }

    .stations-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 15px;
      width: 100%;
      margin-top: 10px;
    }

    .station-btn {
      background: #222;
      border: 2px solid transparent;
      border-radius: 20px;
      width: 90px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s, background 0.3s;
      word-wrap: break-word;
      overflow: hidden;
      text-align: center;
    }

    .station-btn img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      margin-bottom: 5px;
      border-radius: 10px;
    }

    .station-btn span {
      font-size: 0.8rem;
      text-align: center;
      color: #ccc;
      white-space: normal;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;

    .station-btn:hover { transform: scale(1.1); background: #333; }

    main { padding: 20px; text-align: center; position: relative; }

.play-container {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #1a1a1a;
  padding: 10px;
  
  display: flex;
  flex-direction: column;   /* 🔥 esto los pone uno debajo del otro */
  align-items: center;      /* 🔥 centra horizontalmente */
  justify-content: center;
  gap: 8px;                 /* espacio entre botones y volumen */
}

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.volume-control {
  display: flex;
  align-items: center;
  gap: 10px;
}

    .control-btn, .play-btn {
      background: #28a745;
      border: none;
      padding: 15px;
      font-size: 1.2rem;
      border-radius: 50%;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .play-btn {
      font-size: 1.5rem;
      width: 40px;
      height: 40px;
    }

    .control-btn:hover, .play-btn:hover { background: #218838; }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ccc;
    }

    .volume-control input[type="range"] { width: 100px; }

    #time-container {
      position: fixed;
      bottom: 86px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      color: #fff;
      z-index: 1001;
      background-color: #1a1a1a;
      border-top-left-radius:4px;
      border-top-right-radius:4px;
      padding: 6px;
    }

    #status-indicator {
  position: relative;
  cursor: pointer;
}

/* Texto flotante */
#status-indicator::after {
  content: attr(data-status);
  position: absolute;
  bottom: 140%; /* arriba del icono */
  left: 50%;
  transform: translateX(-50%);
  background: #000;
  color: #fff;
  padding: 4px 8px;
  font-size: 15px;
  border-radius: 6px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.2s;
  white-space: nowrap;
}

/* Flechita opcional */
#status-indicator::before {
  content: "";
  position: absolute;
  bottom: 120%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: #000;
  opacity: 0;
  transition: opacity 0.3s;
}

/* Mostrar al pasar el mouse */
#status-indicator:hover::after,
#status-indicator:hover::before {
  opacity: 1;
}

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid #ccc;
      border-top: 3px solid #28a745;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes blink {
  0%   { opacity: 1; }
  50%  { opacity: 0.4; }
  100% { opacity: 1; }
}

.blink {
  animation: blink 2.5s ease-in-out infinite;
}

    .dark-mode { background-color: #0d0d0d; color: #fff; }

  100% { opacity: 1; }

.blink {

  const stationsContainer = document.getElementById('stations');
  const currentStation = document.getElementById('station-text');
  const stationLogo = document.getElementById('station-logo');
  const playBtn = document.getElementById('play-btn');
  const audio = document.getElementById('audio');
  const volumeSlider = document.getElementById('volume-slider');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const timeElapsed = document.getElementById('time-elapsed');
  const spinner = document.getElementById('spinner');
  const errorMessage = document.getElementById('errorMessage');
  const menuToggle = document.getElementById('menu-toggle');
  const menuOptions = document.getElementById('menu-options');
  const statusIndicator = document.getElementById('status-indicator');

  let selectedStation = null;
  let selectedButton = null;
  let currentIndex = -1;
  let timer = null;

  menuToggle.addEventListener('click', () => {
    menuOptions.style.display = menuOptions.style.display === 'flex' ? 'none' : 'flex';
  });

  function setDarkMode() {
    document.body.classList.remove('light-mode');
    document.body.classList.add('dark-mode');
    menuOptions.style.display = 'none';
  }

  function setLightMode() {
    document.body.classList.remove('dark-mode');
    document.body.classList.add('light-mode');
    menuOptions.style.display = 'none';
  }

  stations.forEach((station, index) => {
    const btn = document.createElement('button');
    btn.className = 'station-btn';
    btn.innerHTML = `<img src="${station.logo}" alt="${station.name}"><span>${station.name}</span>`;
    btn.onclick = () => selectStation(station, btn, index);
    stationsContainer.appendChild(btn);
  });

  function selectStation(station, btn, index) {
    spinner.style.display = 'inline-block';
    errorMessage.style.display = 'none';
    statusIndicator.style.display = "inline";
      statusIndicator.classList.remove("blink");
  statusIndicator.textContent = "🔴";
    selectedStation = station;
    currentIndex = index;
    audio.src = station.url;
    if (selectedButton) selectedButton.classList.remove('active-station');
    selectedButton = btn;
    btn.classList.add('active-station');
    stationLogo.src = station.logo;
    stationLogo.style.display = 'block';
    setTimeout(() => {
      audio.play().catch(() => {
        errorMessage.style.display = 'block';
      });
      currentStation.textContent = station.name;
      spinner.style.display = 'none';
      playBtn.textContent = '';
    }, 1200);
    resetTimer();
  }

playBtn.addEventListener('click', () => {
  if (!selectedStation) return;

  if (audio.paused) {
    audio.play().then(() => {
      playBtn.textContent = '⏸';
      startTimer();
    }).catch(() => {
      errorMessage.style.display = 'block';
    });
  } else {
    audio.pause();
    playBtn.textContent = '▶';
    statusIndicator.textContent = "⏸️";
    statusIndicator.classList.remove("blink");
    statusIndicator.setAttribute("data-status", "Pausado");
    clearInterval(timer);
  }
});

  function startTimer() {
    clearInterval(timer);
    timer = setInterval(updateTime, 1000);
  }

  function resetTimer() {
    clearInterval(timer);
    timeElapsed.textContent = "00:00";
    startTimer();
  }

  function updateTime() {
    const minutes = Math.floor(audio.currentTime / 60);
    const seconds = Math.floor(audio.currentTime % 60);
    timeElapsed.textContent = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
  }

  volumeSlider.addEventListener('input', () => {
    audio.volume = volumeSlider.value;
  });

  prevBtn.addEventListener('click', () => {
    if (currentIndex > 0) {
      const prevStation = stations[currentIndex - 1];
      const btns = document.querySelectorAll('.station-btn');
      selectStation(prevStation, btns[currentIndex - 1], currentIndex - 1);
    }
  });

  nextBtn.addEventListener('click', () => {
    if (currentIndex < stations.length - 1) {
      const nextStation = stations[currentIndex + 1];
      const btns = document.querySelectorAll('.station-btn');
      selectStation(nextStation, btns[currentIndex + 1], currentIndex + 1);
    }
  });

/* ===== ESTADO ONLINE / OFFLINE ===== */

audio.addEventListener('playing', () => {
  statusIndicator.textContent = "🟢";
   statusIndicator.classList.add("blink");
   statusIndicator.setAttribute("data-status", "Online");
   playBtn.textContent = '⏸';
});

audio.addEventListener('error', () => {
  statusIndicator.textContent = "🔴";
  statusIndicator.classList.remove("blink");
    statusIndicator.setAttribute("data-status", "Offline");

});

audio.addEventListener('stalled', () => {
  statusIndicator.textContent = "🔴";
  statusIndicator.classList.remove("blink");
    statusIndicator.setAttribute("data-status", "Offline");
});

</script>
